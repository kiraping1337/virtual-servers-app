<div class="page">
  <div class="grid-bg"></div>
  <span class="corner top-left"></span>
  <span class="corner top-right"></span>
  <span class="corner bottom-left"></span>
  <span class="corner bottom-right"></span>

  <div class="card">

    <div class="tabs">
      <button class="tab" [class.active]="isLogin" (click)="switchMode('login')">
        Вход
      </button>
      <button class="tab" [class.active]="!isLogin" (click)="switchMode('register')">
        Регистрация
      </button>
      <span class="tab-indicator" [class.right]="!isLogin"></span>
    </div>

    <div class="form-body">

      @if (errorMessage) {
        <div class="alert-error">{{ errorMessage }}</div>
      }

      <div class="field">
        <label class="label">Имя пользователя</label>
        <input
          class="input"
          type="text"
          placeholder="username"
          [(ngModel)]="username"
          (keyup.enter)="submit()"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label class="label">Пароль</label>
        <input
          class="input"
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          (keyup.enter)="submit()"
          autocomplete="current-password"
        />
      </div>

      <button class="btn-submit" (click)="submit()" [disabled]="loading">
        @if (loading) {
          <svg class="spinner" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="2"
              stroke-dasharray="30 14" stroke-linecap="round"/>
          </svg>
        } @else {
          {{ isLogin ? 'Войти' : 'Зарегистрироваться' }}
        }
      </button>

      @if (isLogin) {
        <p class="footer-note">
          Нет аккаунта? <a class="link" (click)="switchMode('register')">Создать</a>
        </p>
      } @else {
        <p class="footer-note">
          Уже есть аккаунт? <a class="link" (click)="switchMode('login')">Войти</a>
        </p>
      }

    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot"></span>
    <span>Система работает</span>
    <span class="divider">|</span>
    <span>API /api</span>
  </div>
</div>
